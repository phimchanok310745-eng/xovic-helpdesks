<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แชทกับ AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>💬 แชทกับผู้ช่วย AI</h2>
        <div class="card">
            <div class="card-body" id="chatBox" style="height: 400px; overflow-y: auto;">
                <div class="text-muted text-center">เริ่มพูดคุยได้เลย พิมพ์ข้อความด้านล่าง</div>
            </div>
            <div class="card-footer">
                <div class="input-group">
                    <input type="text" class="form-control" id="messageInput" placeholder="พิมพ์ข้อความ...">
                    <button class="btn btn-primary" id="sendBtn">ส่ง</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `alert ${role === 'user' ? 'alert-primary' : 'alert-secondary'} mt-2`;
            div.innerHTML = `<strong>${role === 'user' ? 'คุณ' : 'AI'}:</strong> ${text}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        async function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg) return;
            addMessage('user', msg);
            messageInput.value = '';
            sendBtn.disabled = true;
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                if (res.ok) {
                    addMessage('ai', data.response);
                } else {
                    addMessage('ai', 'ขออภัย เกิดข้อผิดพลาด: ' + (data.detail || 'ไม่ทราบสาเหตุ'));
                }
            } catch (err) {
                addMessage('ai', 'ไม่สามารถเชื่อมต่อกับ AI ได้');
            }
            sendBtn.disabled = false;
            messageInput.focus();
        }
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
