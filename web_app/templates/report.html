<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แจ้งปัญหา - XOVIC Helpdesk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container mt-5">
        <a href="/" class="btn btn-outline-primary mb-3">← กลับหน้าหลัก</a>
        <h2>📝 แจ้งปัญหาใหม่</h2>
        <form id="reportForm">
            <div class="mb-3"><label class="form-label">ชื่อ-นามสกุล</label><input type="text" class="form-control" id="name" required></div>
            <div class="mb-3"><label class="form-label">อีเมล</label><input type="email" class="form-control" id="email" required><div class="form-text">ใช้สำหรับติดตามสถานะและยืนยันตัวตน</div></div>
            <div class="mb-3"><label class="form-label">รายละเอียดปัญหา</label><textarea class="form-control" id="message" rows="5" required></textarea></div>
            <button type="submit" class="btn btn-primary">ส่งเรื่อง</button>
        </form>
        <div id="result" class="mt-3"></div>
    </div>
    <script>
        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            Swal.fire({ title: 'กำลังส่ง...', text: 'กรุณารอสักครู่', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch('/api/tickets', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, email, message})
                });
                const data = await res.json();
                if (res.ok) {
                    Swal.fire('สำเร็จ!', `Ticket ID: ${data.ticket_id}\nกรุณาจดหมายเลขนี้ไว้เพื่อตรวจสอบสถานะ`, 'success');
                    document.getElementById('reportForm').reset();
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', data.detail || 'ไม่สามารถสร้าง Ticket ได้', 'error');
                }
            } catch (err) {
                Swal.fire('ไม่สามารถเชื่อมต่อระบบ', 'กรุณาลองใหม่อีกครั้ง', 'error');
            }
        });
    </script>
</body>
</html>
