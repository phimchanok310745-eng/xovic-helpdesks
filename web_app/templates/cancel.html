<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ยกเลิก Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container mt-5">
        <h2>❌ ยกเลิก Ticket</h2>
        <form id="cancelForm">
            <div class="mb-3"><label class="form-label">หมายเลข Ticket (จำเป็น)</label><input type="text" class="form-control" id="ticketId" placeholder="Ticket ID"></div>
            <div class="mb-3"><label class="form-label">อีเมลหรือ ID ตัวเลข</label><input type="text" class="form-control" id="identifier" required><div class="form-text">กรอกอีเมลหรือเลข ID ที่ระบบบันทึกไว้สำหรับ Ticket นี้ หากไม่มี Ticket ID ให้กรอกช่องนี้อย่างเดียว</div></div>
            <button type="submit" class="btn btn-danger">ยืนยันยกเลิก</button>
        </form>
        <div id="result" class="mt-3"></div>
    </div>
    <script>
        document.getElementById('cancelForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const ticketId = document.getElementById('ticketId').value.trim();
            const identifier = document.getElementById('identifier').value.trim();
            Swal.fire({ title: 'กำลังดำเนินการ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const payload = { identifier };
                if (ticketId) {
                    payload.ticket_id = ticketId;
                }
                const res = await fetch(`/api/tickets/cancel`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    Swal.fire('สำเร็จ!', data.message, 'success');
                    document.getElementById('cancelForm').reset();
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', data.detail || 'ไม่สามารถยกเลิก Ticket ได้', 'error');
                }
            } catch (err) {
                Swal.fire('ไม่สามารถเชื่อมต่อระบบ', 'กรุณาลองอีกครั้ง', 'error');
            }
        });
    </script>
</body>
</html>
