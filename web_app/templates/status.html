<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตรวจสอบสถานะ Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>🔍 ตรวจสอบสถานะ Ticket</h2>
        <div class="input-group mb-3">
            <input type="text" class="form-control" id="ticketId" placeholder="กรอกหมายเลข Ticket">
            <button class="btn btn-primary" id="checkBtn">ตรวจสอบ</button>
        </div>
        <div id="result"></div>
    </div>
    <script>
        document.getElementById('checkBtn').addEventListener('click', async () => {
            const ticketId = document.getElementById('ticketId').value.trim();
            const resultDiv = document.getElementById('result');
            if (!ticketId) { resultDiv.innerHTML = '<div class="alert alert-warning">กรุณากรอกหมายเลข Ticket</div>'; return; }
            resultDiv.innerHTML = '<div class="alert alert-info">กำลังค้นหา...</div>';
            try {
                const res = await fetch(`/api/tickets/${encodeURIComponent(ticketId)}`);
                const data = await res.json();
                if (res.ok) {
                    const statusMap = { 'open': '🟢 เปิดเรื่อง', 'in_progress': '🟡 กำลังดำเนินการ', 'resolved': '🔵 แก้ไขเสร็จ', 'closed': '⚫ ปิดงาน', 'cancelled': '🔴 ยกเลิก' };
                    const status = statusMap[data.status] || data.status;
                    resultDiv.innerHTML = `<div class="card"><div class="card-body"><h5 class="card-title">Ticket: ${data.ticket_id}</h5><p><strong>📌 สถานะ:</strong> ${status}</p><p><strong>👤 ผู้แจ้ง:</strong> ${data.customer_name}</p><p><strong>📝 รายละเอียด:</strong> ${data.issue_details}</p><p><strong>👨‍💻 ผู้รับผิดชอบ:</strong> ${data.assigned_to || 'ยังไม่มี'}</p><p><strong>📅 สร้างเมื่อ:</strong> ${data.created_at}</p><p><strong>🕒 อัปเดตล่าสุด:</strong> ${data.updated_at}</p></div></div>`;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger">❌ ${data.detail}</div>`;
                }
            } catch (err) {
                resultDiv.innerHTML = '<div class="alert alert-danger">ไม่สามารถเชื่อมต่อระบบได้</div>';
            }
        });
    </script>
</body>
</html>
