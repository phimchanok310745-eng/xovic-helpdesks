<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Login Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #1E2A5E 0%, #2A3B7A 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 1.5rem; padding: 2rem; width: 100%; max-width: 400px; }
        .btn-primary { background: #1E2A5E; border: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="fas fa-user-shield fa-3x" style="color: #1E2A5E;"></i>
            <h2>Admin Login</h2>
        </div>
        <form method="post" action="/admin/login">
            <div class="mb-3">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <div class="text-center mt-3">
            <a href="/" class="text-decoration-none">Back to Home</a>
            <span class="mx-2">|</span>
            <a href="/admin/register" class="text-decoration-none">Register as Admin</a>
        </div>
    </div>
</body>
</html>
